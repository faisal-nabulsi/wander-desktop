name: Upload planet basemap to R2

# Streams the Protomaps planet .pmtiles straight into your R2 bucket from a
# GitHub-hosted runner (stable datacenter network) — no laptop bandwidth, no
# external drive. Run it from the Actions tab (Run workflow) after adding the
# three R2 secrets below. This repo is public, so Actions minutes are free.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   R2_ACCESS_KEY_ID      - your ROTATED R2 API token Access Key ID
#   R2_SECRET_ACCESS_KEY  - the matching Secret
#   R2_ACCOUNT_ID         - your Cloudflare account id (the R2 endpoint subdomain)

on:
  workflow_dispatch:
    inputs:
      build_date:
        description: "Protomaps build date YYYYMMDD (see maps.protomaps.com/builds/)"
        required: true
        default: "20260714"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # the 127 GB stream is bandwidth-bound; give it room
    steps:
      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure R2 remote
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          if [ -z "$R2_KEY" ] || [ -z "$R2_SECRET" ] || [ -z "$R2_ACCOUNT" ]; then
            echo "::error::Missing R2 secrets. Add R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ACCOUNT_ID."
            exit 1
          fi
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<CONF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_KEY}
          secret_access_key = ${R2_SECRET}
          endpoint = https://${R2_ACCOUNT}.r2.cloudflarestorage.com
          acl = private
          CONF

      - name: Fetch source size
        id: src
        run: |
          DATE="${{ inputs.build_date }}"
          SRC_URL="https://build.protomaps.com/${DATE}.pmtiles"
          # HEAD the source to learn the exact expected byte count.
          SIZE=$(curl -sIL "$SRC_URL" | awk 'BEGIN{IGNORECASE=1}/^content-length:/{v=$2}END{gsub(/\r/,"",v);print v}')
          if [ -z "$SIZE" ] || [ "$SIZE" -lt 1000000000 ]; then
            echo "::error::Could not determine a sane source size for $SRC_URL (got '$SIZE'). Check the build_date at maps.protomaps.com/builds/."
            exit 1
          fi
          echo "Source $SRC_URL is $SIZE bytes ($(awk -v b="$SIZE" 'BEGIN{printf "%.1f", b/1073741824}') GB)"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Stream planet -> R2 (resumable multipart — no silent truncation)
        run: |
          set -o pipefail
          DATE="${{ inputs.build_date }}"
          # rclone's S3 multipart only FINALIZES the object once EVERY part uploaded,
          # so a network blip can never commit a truncated file. (The old curl|rclone-rcat
          # fallback did exactly that — it silently committed a 6.8% partial. Removed.)
          # Retry the whole copy a few times; each attempt is self-verifying.
          ok=""
          for attempt in 1 2 3; do
            echo "== upload attempt $attempt of 3 =="
            if rclone copyto ":http:${DATE}.pmtiles" "r2:wander-basemap/planet.pmtiles" \
                 --http-url "https://build.protomaps.com" \
                 --s3-no-check-bucket --s3-chunk-size 256M --s3-upload-concurrency 4 \
                 --low-level-retries 30 --retries 5 --retries-sleep 30s \
                 -v --stats 60s --stats-one-line ; then
              ok=1; break
            fi
            echo "attempt $attempt failed; retrying the full multipart copy..."
          done
          [ -n "$ok" ] || { echo "::error::rclone multipart upload failed after 3 attempts."; exit 1; }

      - name: Verify R2 object matches source (fail on truncation)
        run: |
          SRC=${{ steps.src.outputs.size }}
          DST=$(rclone size r2:wander-basemap/planet.pmtiles --json | python3 -c "import sys,json;print(json.load(sys.stdin)['bytes'])")
          echo "source=$SRC bytes   r2=$DST bytes"
          if [ "$SRC" != "$DST" ]; then
            echo "::error::TRUNCATION DETECTED — R2 object is $DST bytes but the source is $SRC bytes. The upload is INCOMPLETE and not usable. Re-run this workflow."
            exit 1
          fi
          echo "OK: R2 object is complete and byte-exact ($DST bytes)."
