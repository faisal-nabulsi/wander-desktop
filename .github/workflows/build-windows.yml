name: Build Windows

# Builds a standalone Windows .exe of Wander Desktop with PyInstaller.
# Mirrors build-desktop.sh (the macOS build) with Windows-specific differences:
#   * --add-data uses ';' as the src;dest separator (macOS uses ':')
#   * --icon wander.ico  (macOS uses wander.icns)
# The onedir "dist/Wander Desktop" folder is zipped and uploaded as an artifact.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          # PINNED — the device code targets the 4.x API. These two pins match
          # requirements.txt and are re-asserted here so a stray transitive bump
          # can't break the frozen build.
          python -m pip install "pymobiledevice3==4.14.0" "ipsw-parser==1.3.4"
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow

      - name: Generate wander.ico (if missing)
        shell: pwsh
        run: |
          if (Test-Path "wander.ico") {
            Write-Host "wander.ico already present in repo — using it."
          } else {
            Write-Host "wander.ico not found — generating from the penguin logo."
            $src = "src/static/wander-mark.png"
            if (-not (Test-Path $src)) { $src = "src/static/favicon.png" }
            python -c "from PIL import Image; Image.open(r'$src').convert('RGBA').save('wander.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Explicitly hidden-import every pymobiledevice3 submodule main.py references
          # (--collect-submodules misses some deep ones like services.dvt.*). Same grep
          # the macOS build (build-desktop.sh) uses.
          $hidden = Select-String -Path "src/main.py" -Pattern "pymobiledevice3(\.[a-zA-Z0-9_]+)+" -AllMatches |
            ForEach-Object { $_.Matches.Value } | Sort-Object -Unique
          $hiddenArgs = @()
          foreach ($h in $hidden) { $hiddenArgs += "--hidden-import=$h" }
          Write-Host "hidden imports: $($hidden -join ', ')"

          # NOTE Windows: --add-data uses ';' (not ':') as the src;dest separator.
          $args = @(
            "--noconfirm", "--name", "Wander Desktop", "--windowed",
            "--icon", "wander.ico",
            "--add-data", "src/templates;templates",
            "--add-data", "src/data;data",
            "--add-data", "src/static;static",
            "--collect-all", "pymobiledevice3",
            "--collect-submodules", "pymobiledevice3",
            "--recursive-copy-metadata", "pymobiledevice3",
            "--collect-all", "inquirer3",
            "--collect-all", "readchar",
            "--collect-all", "pywebview",
            "--collect-data", "pycountry"
          )
          $args += $hiddenArgs
          $args += "src/main.py"

          python -m PyInstaller @args

      - name: Show build result
        shell: pwsh
        run: |
          if (Test-Path "dist/Wander Desktop/Wander Desktop.exe") {
            Write-Host "EXE BUILT: dist/Wander Desktop/Wander Desktop.exe"
            Get-ChildItem "dist/Wander Desktop" | Select-Object -First 20
          } else {
            Write-Error "No .exe produced — listing dist/:"
            Get-ChildItem -Recurse dist
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wander-Desktop-Windows
          path: dist/Wander Desktop
          if-no-files-found: error
